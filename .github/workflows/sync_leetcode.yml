name: Sync Leetcode

on:
  workflow_dispatch: # Allows you to trigger it manually
  schedule:
    - cron: "0 8 * * 6" # Runs automatically every Saturday at 8:00 AM

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Sync Submissions
        uses: joshcai/leetcode-sync@v1.5
        with:
          github-token: ${{ github.token }}
          leetcode-csrf-token: ${{ secrets.LEETCODE_CSRF_TOKEN }}
          leetcode-session: ${{ secrets.LEETCODE_SESSION }}
          destination-folder: 'past_submissions' # Optional: puts code in a specific folder
